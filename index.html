<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CutIT</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>


<header>

<h1>CutIT</h1>

<div>

<button id="saveBtn">

Save Project

</button>


<button id="loadBtn">

Load Project

</button>


<input type="file"
id="loadFile"
hidden>

</div>

</header>



<div class="main">



<aside>



<h2>Cabinet Wizard</h2>



<label>

Cabinet Type

</label>

<select id="cabinetType">

<option>Base Cabinet</option>

<option>Wall Cabinet</option>

<option>Pantry</option>

<option>Vanity</option>

<option>Tall Cabinet</option>

</select>




<label>

Width

</label>

<input id="width"
type="number"
value="900">



<label>

Height

</label>

<input id="height"
type="number"
value="720">



<label>

Depth

</label>

<input id="depth"
type="number"
value="580">




<label>

Shelves

</label>

<input id="shelves"
type="number"
value="1">




<label>

Doors

</label>

<input id="doors"
type="number"
value="2">



<label>

Drawers

</label>

<input id="drawers"
type="number"
value="0">



<button id="addCabinet">

Add Cabinet

</button>



<hr>



<h2>

Project Cabinets

</h2>



<div id="cabinetList">

</div>




<hr>




<h2>

Materials

</h2>


<div id="materialSummary">


18mm Ply


0 sheets


</div>



</aside>




<section class="workspace">



<div class="viewer">


<h2>

Cut Sheets

</h2>



<canvas id="sheetCanvas">

</canvas>



</div>




<div class="viewer">


<h2>

Cabinet Preview

</h2>



<canvas id="previewCanvas">

</canvas>



</div>



</section>



</div>



<script type="module"
src="js/app.js">

</script>


</body>

</html>
